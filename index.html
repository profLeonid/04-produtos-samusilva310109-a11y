<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="./js/main.js"></script>
  </head>
    <title>Document</title>
</head>
<body class="flex flex-col items-center w-full h-full">
    <main id="main" class="grid grid-cols-[fr] gap-[15px] p-[25px] bg-gray-200 mt-[20px] rounded-[5px]">
        <h1 class="text-[20px] ">
            Tabela de Produtos
        </h1>
        <div class="flex flex-col">
            <label for="codigo">Nome do produto</label>
            <input type="text" id="produto" class="border border-solid border-[#c0c0c0] rounded-[2px] bg-white [15px]">
        </div>
        <div class="flex flex-col">
            <label for="produto">Código do produto</label>
            <input type="number" id="codigo" class="border border-solid border-[#c0c0c0] rounded-[2px] bg-white [15px]">
        </div>
        <div class="flex flex-col">
            <label for="quantidade">Quantidade do produto</label>
            <input type="number" id="quantidade" class="border border-solid border-[#c0c0c0] rounded-[2px] bg-white [15px]">
        </div>
        <button onclick="registrarProdutos()" class="bg-blue-600 text-white rounded-[5px] p-[5px]">Registrar</button>
        <div id="lista" class="grid grid-cols-[fr fr fr]">
            <div id="titulo" class="flex justify-between text-[12px]">
                <h3>Código</h3>
                <h3>Produto</h3>
                <h3>Quantidade</h3>
            </div>
        </div>
    </main>
</body>
</html>
